<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head th:replace="~{layout/plantilla :: head}"></head>
    <body class="bg-dark text-white">
        <header th:replace="~{layout/plantilla :: header}"></header>

        <div class="container mt-5">
            <div class="row mb-4 border-bottom border-danger pb-3">
                <div class="col-md-8">
                    <h2 class="text-danger fw-bold">
                        <i class="bi bi-shield-lock-fill me-2"></i>Panel de Control: Usuarios
                    </h2>
                    <p class="text-white-50">Gestión de guardianes de la forja Dragonstone.</p>
                </div>
                <div class="col-md-4 text-end d-flex align-items-center justify-content-end">
                    <span class="badge bg-danger p-2 px-3 shadow">
                        Total: 3 Administradores
                    </span>
                </div>
            </div>

            <div class="card bg-dark border-secondary shadow-lg">
                <div class="card-body p-0">
                    <table class="table table-dark table-hover mb-0 align-middle">
                        <thead style="border-top: 2px solid #e63946;">
                            <tr>
                                <th class="p-3">Usuario</th>
                                <th>Rol Asignado</th>
                                <th>Estado</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="p-3">
                                    <div class="d-flex align-items-center">
                                        <div class="bg-danger rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 35px; height: 35px;">
                                            <i class="bi bi-person-fill text-white"></i>
                                        </div>
                                        <div>
                                            <div class="fw-bold">kendall</div>
                                            <small class="text-white-50">kendall@dragonstone.com</small>
                                        </div>
                                    </div>
                                </td>
                                <td><span class="badge rounded-pill bg-danger">ADMIN</span></td>
                                <td><span class="text-success small"><i class="bi bi-circle-fill me-1"></i> Activo</span></td>
                                <td class="text-center">
                                    <button class="btn btn-outline-light btn-sm border-secondary opacity-50"><i class="bi bi-pencil"></i></button>
                                </td>
                            </tr>
                            
                            <tr>
                                <td class="p-3">
                                    <div class="d-flex align-items-center">
                                        <div class="bg-danger rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 35px; height: 35px;">
                                            <i class="bi bi-person-fill text-white"></i>
                                        </div>
                                        <div>
                                            <div class="fw-bold">brandon</div>
                                            <small class="text-white-50">brandon@dragonstone.com</small>
                                        </div>
                                    </div>
                                </td>
                                <td><span class="badge rounded-pill bg-danger">ADMIN</span></td>
                                <td><span class="text-success small"><i class="bi bi-circle-fill me-1"></i> Activo</span></td>
                                <td class="text-center">
                                    <button class="btn btn-outline-light btn-sm border-secondary opacity-50"><i class="bi bi-pencil"></i></button>
                                </td>
                            </tr>

                            <tr>
                                <td class="p-3">
                                    <div class="d-flex align-items-center">
                                        <div class="bg-danger rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 35px; height: 35px;">
                                            <i class="bi bi-person-fill text-white"></i>
                                        </div>
                                        <div>
                                            <div class="fw-bold">deyrron</div>
                                            <small class="text-white-50">deyrron@dragonstone.com</small>
                                        </div>
                                    </div>
                                </td>
                                <td><span class="badge rounded-pill bg-danger">ADMIN</span></td>
                                <td><span class="text-success small"><i class="bi bi-circle-fill me-1"></i> Activo</span></td>
                                <td class="text-center">
                                    <button class="btn btn-outline-light btn-sm border-secondary opacity-50"><i class="bi bi-pencil"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="mt-4">
                <a th:href="@{/}" class="text-danger text-decoration-none small fw-bold">
                    <i class="bi bi-arrow-left-circle me-1"></i> VOLVER AL INICIO
                </a>
            </div>
        </div>

        <footer th:replace="~{layout/plantilla :: footer}"></footer>
        <div th:replace="~{layout/plantilla :: scripts}"></div>
    </body>
</html>
