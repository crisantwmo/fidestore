<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>
        <header th:replace="~{general/fragmentos :: header}"></header>

        <main class="container py-5">
            <div class="glass-card text-center p-5 shadow-lg" style="background: rgba(26, 26, 26, 0.9); border-radius: 15px; border: 1px solid #333;">
                
                <h1 class="text-neon display-4 font-monospace">SISTEMA FIDESTORE</h1>
                <p class="text-muted italic">Marketplace de Hardware Vintage & Coleccionables</p>
                
                <hr class="border-secondary my-4">

                <div class="actions-container">
                    <div sec:authorize="!isAuthenticated()">
                        <p class="mb-4">Terminal en modo lectura. Identifíquese para operar.</p>
                        <a th:href="@{/login}" class="btn btn-warning btn-lg px-5 shadow">
                            <i class="fas fa-terminal"></i> INGRESAR AL SISTEMA
                        </a>
                    </div>

                    <div sec:authorize="isAuthenticated()">
                        <p class="mb-4">
                            Bienvenido, <span class="text-neon" th:text="${#authentication.name}">Usuario</span>.
                        </p>

                        <div class="d-flex justify-content-center gap-3">
                            <a th:href="@{/producto/listado}" class="btn btn-outline-warning">
                                <i class="fas fa-box"></i> Inventario
                            </a>
                            <a sec:authorize="hasRole('ROLE_ADMIN')" th:href="@{/usuario/listado}" class="btn btn-warning">
                                <i class="fas fa-users-cog"></i> Gestión Usuarios
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
