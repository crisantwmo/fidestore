<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>FideStore</title>
        <meta charset="UTF-8">
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link th:href="@{/estilos.css}" rel="stylesheet"/>
    </head>
    <body>
        <main class="hero-container">
            <div class="glass-card text-center">
                <div class="logo-wrapper">
                    <img th:src="@{/images/computer.png}" alt="Tech Logo" class="main-logo"/>
                </div>
                
                <h1 class="brand-title">FideStore</h1>
                <p class="brand-subtitle">Innovación y Hardware al alcance de un click</p>
                
                <hr class="separator">

                <div class="actions-container mt-4">
                    <div sec:authorize="!isAuthenticated()">
                        <p class="mb-4" style="color: #888;">Bienvenido, invitado. Por favor, identifícate para continuar.</p>

                        <a th:href="@{/login}" class="btn-neon">
                            INGRESAR AL SISTEMA
                        </a>
                    </div>

                    <div sec:authorize="isAuthenticated()">
                        <p class="mb-4" style="color: #888;">
                            Hola, <span th:text="${#authentication.name}" style="color: #00d4ff; font-weight: bold; text-transform: capitalize;">usuario</span>. 
                            ¿Qué deseas gestionar hoy?
                        </p>

                        <div class="d-flex justify-content-center gap-3">
                            <a th:href="@{/producto/listado}" class="btn btn-outline-primary">Productos</a>
                            <a th:href="@{/usuario/listado}" class="btn btn-primary">Usuarios</a>
                        </div>

                        <form th:action="@{/logout}" method="post" class="mt-4">
                            <button type="submit" style="background:none; border:none; color:#555; font-size:0.8rem; cursor:pointer; transition:0.3s;" 
                                    onmouseover="this.style.color='#ff4b2b'" onmouseout="this.style.color='#555'">
                                <i class="fas fa-power-off"></i> Cerrar Sesión
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
