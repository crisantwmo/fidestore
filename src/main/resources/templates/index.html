<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Dragonstone - Inicio</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/estilos_dragon.css}" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar-dragon { background-color: #000; border-bottom: 2px solid #e63946; }
        .hero-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .dragon-title { font-size: 4.5rem; font-weight: bold; color: #e63946; letter-spacing: 5px; text-transform: uppercase; }
        .italic-subtitle { font-style: italic; color: #888; margin-bottom: 2rem; }
        /* Estilo para el botón de ayuda flotante o destacado */
        .btn-help { position: fixed; bottom: 20px; right: 20px; border-radius: 50px; padding: 10px 20px; z-index: 1000; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-dragon p-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
                <img th:src="@{/images/logo-dragon.png}" alt="Logo" style="width: 35px; margin-right: 10px;">
                <span style="color: #e63946; font-weight: bold;">DRAGONSTONE</span>
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/gameshop/listado}">Videojuegos</a>
                <a class="nav-link" th:href="@{/categoria/listado}">Categorías</a>
                
                <div sec:authorize="hasRole('ROLE_ADMIN')" class="d-inline-flex">
                    <a class="nav-link" th:href="@{/consultas/listado}">Consultas</a>
                    <a class="nav-link text-warning fw-bold" th:href="@{/admin/listado}">Admin</a>
                </div>

                <div class="ms-3">
                    <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="btn btn-sm btn-outline-danger">Sign In</a>
                    <div sec:authorize="isAuthenticated()" class="dropdown d-inline">
                        <button class="btn btn-sm btn-danger dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <span sec:authentication="name">Usuario</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                            <li><form th:action="@{/logout}" method="post"><button type="submit" class="dropdown-item">Cerrar Sesión</button></form></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="hero-section">
        <img th:src="@{/images/logo-dragon.png}" alt="Logo" style="width:180px; margin-bottom: 20px;">
        <h1 class="dragon-title">DRAGONSTONE</h1>
        <p class="italic-subtitle">"Nada de soporta ni de quesos..."</p>
        <div class="d-flex gap-3 mt-2">
            <a th:href="@{/gameshop/listado}" class="btn btn-outline-danger btn-lg px-4">Catálogo</a>
            <a th:href="@{/categoria/listado}" class="btn btn-danger btn-lg px-4">Categorías</a>
        </div>
    </main>

    <a th:href="@{/ayuda}" class="btn btn-warning btn-help fw-bold shadow">
        ¿Necesitas Ayuda? 🛡️
    </a>

    <footer class="p-4 text-center border-top border-secondary">
        <p class="text-muted small">© 2026 Dragonstone - Keny's Project</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
