<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>
        <header th:replace="~{general/fragmentos :: header}"></header>

        <main class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-7">
                    <div class="card-custom p-4 shadow" style="border-radius: 10px;">
                        <h4 class="text-neon mb-4">
                            <i class="fas fa-id-card"></i> Mi Perfil
                        </h4>

                        <div th:if="${soloLectura}" class="alert alert-neon-danger py-2 mb-3">
                            <i class="fas fa-info-circle"></i>
                            Eres un usuario de prueba del sistema. El perfil editable solo está disponible para cuentas registradas.
                        </div>

                        <div th:if="${exito}" class="alert alert-neon-success py-2" th:text="${exito}"></div>
                        <div th:if="${error}"  class="alert alert-neon-danger py-2"  th:text="${error}"></div>

                        <form th:action="@{/perfil}" method="post" th:object="${usuario}" th:if="${!soloLectura}">
                            <input type="hidden" th:field="*{idUsuario}"/>

                            <div class="mb-3">
                                <label class="form-label text-muted small">Nombre</label>
                                <input type="text" name="nombre" th:value="${usuario.nombre}"
                                       class="form-control form-control-dark" required/>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small">Correo</label>
                                <input type="email" th:value="${usuario.correo}"
                                       class="form-control form-control-dark" disabled/>
                                <div class="form-text text-muted small">El correo no puede modificarse.</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small">Rol actual</label>
                                <input type="text" th:value="${usuario.rol}"
                                       class="form-control form-control-dark" disabled/>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small">Nueva contraseña <span class="text-muted">(dejar en blanco para no cambiar)</span></label>
                                <input type="password" name="nuevaContrasena"
                                       class="form-control form-control-dark"
                                       placeholder="Nueva contraseña" minlength="6"/>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-warning fw-bold">
                                    <i class="fas fa-save"></i> Guardar Cambios
                                </button>
                                <a th:href="@{/}" class="btn btn-outline-secondary">
                                    <i class="fas fa-arrow-left"></i> Volver
                                </a>
                            </div>
                        </form>

                        <div th:if="${soloLectura}" class="mt-3">
                            <div class="mb-3">
                                <label class="form-label text-muted small">Usuario</label>
                                <input type="text" th:value="${usuario.nombre}"
                                       class="form-control form-control-dark" disabled/>
                            </div>
                            <a th:href="@{/}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left"></i> Volver al inicio
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
