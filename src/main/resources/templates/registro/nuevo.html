<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>
        <header th:replace="~{general/fragmentos :: header}"></header>

        <main class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card card-custom border-info shadow-lg">
                        <div class="card-header bg-info text-dark text-center">
                            <h3 class="font-monospace mb-0"><i class="fas fa-user-plus"></i> REGISTRO DE CLIENTE</h3>
                        </div>
                        <div class="card-body p-4 bg-dark">
                            <form th:action="@{/registro/crear}" method="post" th:object="${usuario}">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label text-info">Nombre de Usuario</label>
                                        <input type="text" name="username" class="form-control bg-dark text-white border-secondary" placeholder="Ej: retro_gamer" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label text-info">Nombre Completo</label>
                                        <input type="text" name="nombre" class="form-control bg-dark text-white border-secondary" placeholder="Tu nombre" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-info">Correo Electrónico</label>
                                    <input type="email" name="correo" class="form-control bg-dark text-white border-secondary" placeholder="hardware@vintage.com" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-info">Contraseña</label>
                                    <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
                                </div>
                                
                                <button type="submit" class="btn btn-info w-100 mt-3 shadow">
                                    <i class="fas fa-save"></i> CREAR CUENTA
                                </button>
                            </form>
                            
                            <div class="text-center mt-4">
                                <a th:href="@{/login}" class="text-warning small font-monospace" style="text-decoration: none;">
                                    <i class="fas fa-arrow-left"></i> REGRESAR AL LOGIN
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
