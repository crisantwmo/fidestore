<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{layout/plantilla :: head}"></head>
    <body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">
        <div class="card bg-dark border-danger shadow-lg p-4" style="width: 400px; border-width: 2px;">
            <div class="text-center mb-4">
                <img th:src="@{/images/logo-dragon.png}" width="80" class="mb-3">
                <h3 class="text-danger fw-bold">ÚNETE A LA FORJA</h3>
                <p class="text-white-50 small">Crea tu perfil de aventurero</p>
            </div>

            <form th:action="@{/registro/crear}" method="POST">
                <div class="mb-3 text-start">
                    <label class="text-white-50 small mb-1"><i class="bi bi-person me-1"></i> Nombre de usuario (apodo)</label>
                    <input type="text" name="username" class="form-control bg-dark text-white border-secondary shadow-sm" 
                           placeholder="Ej: DragonSlayer26" required>
                </div>

                <div class="mb-3 text-start">
                    <label class="text-white-50 small mb-1"><i class="bi bi-envelope me-1"></i> Correo electrónico</label>
                    <input type="email" name="email" class="form-control bg-dark text-white border-secondary shadow-sm" 
                           placeholder="nombre@ejemplo.com" required>
                    <div class="form-text text-danger" style="font-size: 0.75rem;">Te enviaremos un link para activar tu cuenta.</div>
                </div>

                <div class="mb-3 text-start">
                    <label class="text-white-50 small mb-1"><i class="bi bi-lock me-1"></i> Contraseña segura</label>
                    <input type="password" id="password" name="password" class="form-control bg-dark text-white border-secondary shadow-sm" 
                           placeholder="Mínimo 8 caracteres" required>
                </div>

                <div class="mb-4 text-start">
                    <label class="text-white-50 small mb-1"><i class="bi bi-shield-check me-1"></i> Confirmar contraseña</label>
                    <input type="password" id="confirmPassword" class="form-control bg-dark text-white border-secondary shadow-sm" 
                           placeholder="Repite tu contraseña" required oninput="validarPassword()">
                    <div id="passwordError" class="text-danger mt-1 d-none" style="font-size: 0.75rem;">
                        <i class="bi bi-exclamation-triangle"></i> Las contraseñas no coinciden.
                    </div>
                </div>

                <button type="submit" id="btnRegistro" class="btn btn-danger w-100 fw-bold shadow-lg py-2">
                    <i class="bi bi-fire me-2"></i> REGISTRARSE
                </button>
            </form>

            <script>
                function validarPassword() {
                    const pass = document.getElementById('password').value;
                    const confirm = document.getElementById('confirmPassword').value;
                    const errorDiv = document.getElementById('passwordError');
                    const btn = document.getElementById('btnRegistro');

                    if (confirm && pass !== confirm) {
                        errorDiv.classList.remove('d-none');
                        btn.disabled = true;
                    } else {
                        errorDiv.classList.add('d-none');
                        btn.disabled = false;
                    }
                }
            </script>

            <div class="mt-3 text-center">
                <a th:href="@{/login}" class="text-white-50 small text-decoration-none">Ya tengo cuenta, ir al Login</a>
            </div>
        </div>
    </body>
</html>
