<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head th:fragment="head">
        <title>Dragonstone - Gameshop</title>
        <meta charset="UTF-8"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <link th:href="@{/css/estilos.css}" rel="stylesheet" type="text/css"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    </head>
    <body>

        <header th:fragment="header" class="header">
            <nav class="navbar navbar-expand-sm navbar-dark bg-dark p-3 border-bottom border-danger">
                <div class="container">
                    <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
                        <img th:src="@{/images/logo-dragon.png}" width="45" height="45" class="me-2">
                        <span class="fw-bold text-danger">DRAGONSTONE</span>
                    </a>

                    <div class="collapse navbar-collapse" id="navbarMain">
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item"><a class="nav-link text-white" th:href="@{/gameshop/listado}">Videojuegos</a></li>
                            <li class="nav-item"><a class="nav-link text-white" th:href="@{/categoria/listado}">Categorías</a></li>
                            <li class="nav-item"><a class="nav-link text-white" th:href="@{/consulta/listado}">Consulta</a></li>
                            <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                                <a class="nav-link text-danger fw-bold" th:href="@{/admin/usuarios}">
                                    <i class="bi bi-gear-fill me-1"></i> Admin
                                </a>
                            </li>
                        </ul>

                        <div class="d-flex align-items-center">
                            <a th:href="@{/login}" class="btn btn-outline-danger btn-sm" sec:authorize="!isAuthenticated()">Sign In</a>

                            <div class="dropdown" sec:authorize="isAuthenticated()">
                                <button class="btn btn-danger btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                    <i class="bi bi-person-circle me-1"></i> <span sec:authentication="name">Usuario</span>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                                    <li>
                                        <form th:action="@{/logout}" method="post" class="m-0">
                                            <button type="submit" class="dropdown-item text-danger">Cerrar Sesión</button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>
        </header>

        <footer th:fragment="footer" class="footer mt-auto py-3 bg-dark border-top border-danger">
            <div class="container text-center">
                <div class="row align-items-center">
                    <div class="col-md-4 text-start"><p class="text-white-50 mb-0">&copy; 2026 Dragonstone</p></div>
                    <div class="col-md-4"><img th:src="@{/images/logo-dragon.png}" width="30" style="opacity: 0.5;"></div>
                    <div class="col-md-4 text-end"><span class="text-danger fw-bold">Keny's Project</span></div>
                </div>
            </div>
        </footer>

        <div th:fragment="scripts">
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        </div>
    </body>
</html>
