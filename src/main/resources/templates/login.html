<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head>
        <title>FideStore - Iniciar Sesión</title>
        <meta charset="UTF-8"/>
        <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet"/>
        <link th:href="@{/webjars/font-awesome/6.5.1/css/all.min.css}" rel="stylesheet"/>
        <style>
            body { background-color: #f8f9fa; }
            .login-container { max-width: 400px; margin-top: 100px; }
        </style>
    </head>
    <body>
        <div class="container login-container">
            <div class="card shadow">
                <div class="card-header bg-dark text-white text-center">
                    <h4><i class="fas fa-lock"></i> Iniciar Sesión</h4>
                </div>
                <div class="card-body">
                    <div th:if="${param.error}" class="alert alert-danger">
                        Usuario o contraseña incorrectos.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success">
                        Has salido de la sesión con éxito.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Usuario</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" name="username" id="username" class="form-control" placeholder="juan" required autofocus/>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-key"></i></span>
                                <input type="password" name="password" id="password" class="form-control" placeholder="***" required/>
                            </div>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-sign-in-alt"></i> Entrar
                            </button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <a th:href="@{/}" class="text-decoration-none text-muted small">Volver al inicio</a>
                </div>
            </div>
        </div>
    </body>
</html>
