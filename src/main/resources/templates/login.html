<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head>
        <title>FideStore - Iniciar Sesión</title>
        <meta charset="UTF-8"/>
        <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet"/>
        <link th:href="@{/webjars/font-awesome/6.5.1/css/all.min.css}" rel="stylesheet"/>
        <style>
            body { background-color: #0d0d0d; color: #e0e0e0; font-family: 'Courier New', Courier, monospace; }
            .login-container { max-width: 420px; margin: 80px auto; }
            .card-dark { background-color: #1a1a1a; border: 1px solid #ffc107; border-radius: 10px; }
            .form-control-dark { background-color: #111; border: 1px solid #444; color: #e0e0e0; }
            .form-control-dark:focus { background-color: #111; border-color: #ffc107; color: #e0e0e0; box-shadow: 0 0 5px #ffc10755; }
            .form-control-dark::placeholder { color: #555; }
        </style>
    </head>
    <body>
        <div class="container login-container">
            <div class="text-center mb-4">
                <h2 class="text-warning"><i class="fas fa-microchip"></i> FIDESTORE</h2>
                <p class="text-muted small">Acceso al sistema</p>
            </div>
            <div class="card-dark p-4 shadow">
                <h5 class="text-center text-warning mb-4"><i class="fas fa-lock"></i> Iniciar Sesión</h5>

                <div th:if="${param.error}" class="alert alert-danger py-2">
                    <i class="fas fa-exclamation-circle"></i> Usuario o contraseña incorrectos.
                </div>
                <div th:if="${param.logout}" class="alert alert-success py-2">
                    <i class="fas fa-check-circle"></i> Sesión cerrada exitosamente.
                </div>
                <div th:if="${exito}" class="alert alert-success py-2" th:text="${exito}"></div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label text-muted small">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-warning">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" name="username" class="form-control form-control-dark"
                                   placeholder="usuario" required autofocus/>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-warning">
                                <i class="fas fa-key"></i>
                            </span>
                            <input type="password" name="password" class="form-control form-control-dark"
                                   placeholder="***" required/>
                        </div>
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-warning fw-bold">
                            <i class="fas fa-sign-in-alt"></i> Ingresar
                        </button>
                    </div>
                </form>

                <hr class="border-secondary">
                <div class="text-center small">
                    <span class="text-muted">¿No tienes cuenta?</span>
                    <a th:href="@{/registro}" class="text-warning text-decoration-none ms-1">Regístrate aquí</a>
                </div>
                <div class="text-center mt-2">
                    <a th:href="@{/}" class="text-muted small text-decoration-none">
                        <i class="fas fa-arrow-left"></i> Volver al inicio
                    </a>
                </div>
            </div>
        </div>
    </body>
</html>
