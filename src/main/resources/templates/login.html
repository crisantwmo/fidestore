<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{layout/plantilla :: head}"></head>
    <body class="bg-dark d-flex align-items-center justify-content-center" style="min-height: 100vh; background: radial-gradient(circle, #2b2b2b 0%, #1a1a1a 100%);">

        <div class="card bg-dark border-danger shadow-lg" style="width: 100%; max-width: 400px; border-width: 2px;">
            <div class="card-body p-5 text-center">

                <div class="mb-4">
                    <img th:src="@{/images/logo-dragon.png}" alt="Dragonstone Logo" width="80" class="mb-3" style="filter: drop-shadow(0 0 10px rgba(230, 57, 70, 0.4));">
                        <h2 class="fw-bold text-danger" style="letter-spacing: 2px;">DRAGONSTONE</h2>
                        <p class="text-white-50 small">Ingresa a la forja de clásicos</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger py-2 mb-4" role="alert" style="font-size: 0.85rem;">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> Credenciales inválidas. Inténtalo de nuevo.
                </div>

                <div th:if="${param.logout}" class="alert alert-info py-2 mb-4" role="alert" style="font-size: 0.85rem;">
                    Has cerrado sesión correctamente.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-floating mb-3">
                        <input type="text" name="username" class="form-control bg-dark text-white border-secondary shadow-none" id="username" placeholder="Usuario" required style="border-radius: 8px;">
                            <label for="username" class="text-white-50">Nombre de Usuario</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="password" name="password" class="form-control bg-dark text-white border-secondary shadow-none" id="password" placeholder="Contraseña" required style="border-radius: 8px;">
                            <label for="password" class="text-white-50">Contraseña</label>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-danger btn-lg fw-bold" style="background-color: #e63946; border: none; border-radius: 8px; transition: 0.3s;">
                            Entrar
                        </button>
                    </div>
                </form>

                <div class="mt-3 text-center">
                    <p class="text-white-50 small">¿No tienes cuenta? 
                        <a th:href="@{/registro/nuevo}" class="text-danger fw-bold text-decoration-none">Crea una aquí</a>
                    </p>
                    <a th:href="@{/}" class="text-white-50 small text-decoration-none">← Volver al inicio</a>
                </div>

            </div>
        </div>

        <div th:replace="~{layout/plantilla :: scripts}"></div>

        <style>
            /* Efecto focus en los inputs para que se vean rojos al escribir */
            .form-control:focus {
                border-color: #e63946 !important;
                background-color: #2b2b2b !important;
                color: white !important;
            }
            .form-control::placeholder {
                color: rgba(255,255,255,0.3);
            }

            /* Ajuste de labels flotantes para fondo oscuro */
            .form-floating > .form-control:focus ~ label,
            .form-floating > .form-control:not(:placeholder-shown) ~ label {
                color: #e63946 !important;
                opacity: 0.8;
            }
        </style>

    </body>
</html>
