<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>
    
    <body>
        <header th:replace="~{general/fragmentos :: header}"></header>

        <main class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card card-custom border-warning shadow-lg">
                        <div class="card-header bg-warning text-dark text-center">
                            <h3 class="font-monospace"><i class="fas fa-lock"></i> INICIAR SESIÓN</h3>
                        </div>
                        <div class="card-body p-4">
                            <div th:if="${param.logout}" class="alert alert-info bg-dark text-info border-info">
                                Has salido de la sesión con éxito.
                            </div>
                            <div th:if="${param.error}" class="alert alert-danger bg-dark text-danger border-danger">
                                Usuario o contraseña incorrectos.
                            </div>

                            <form th:action="@{/login}" method="post">
                                <div class="mb-3">
                                    <label class="form-label text-warning">Usuario</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-dark border-secondary text-warning">
                                            <i class="fas fa-user"></i>
                                        </span>
                                        <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-warning">Contraseña</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-dark border-secondary text-warning">
                                            <i class="fas fa-key"></i>
                                        </span>
                                        <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-warning w-100 mt-3 shadow">
                                    <i class="fas fa-sign-in-alt"></i> ENTRAR
                                </button>
                            </form>
                            <div class="text-center mt-4">
                                <a th:href="@{/}" class="text-warning small font-monospace" style="text-decoration: none; opacity: 0.8;">
                                    <i class="fas fa-arrow-left"></i> VOLVER AL INICIO
                                </a>
                            </div>
                            <div class="text-center mt-3">
                                <p class="text-warning small font-monospace" style="opacity: 0.7;">¿No tienes cuenta?</p>
                                <a th:href="@{/registro/nuevo}" class="btn btn-outline-info btn-sm">
                                    <i class="fas fa-user-plus"></i> CREAR CUENTA NUEVA
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
