<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>
        <header th:replace="~{general/fragmentos :: header}"></header>

        <main class="container py-5">
            <h4 class="text-neon mb-4">
                <i class="fas fa-users-cog"></i> Gestión de Usuarios
            </h4>

            <div class="table-responsive">
                <table class="table table-dark-custom table-borderless">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Rol</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${usuarios}">
                            <td th:text="${u.idUsuario}"></td>
                            <td th:text="${u.nombre}"></td>
                            <td class="text-muted" th:text="${u.correo}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${u.rol == 'ADMIN'} ? 'bg-warning text-dark' : (${u.rol == 'VENDEDOR'} ? 'bg-info text-dark' : 'bg-secondary')"
                                      th:text="${u.rol}"></span>
                            </td>
                            <td>
                                <span th:if="${u.activo}" class="badge bg-success">Activo</span>
                                <span th:unless="${u.activo}" class="badge bg-danger">Inactivo</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <a th:href="@{/}" class="btn btn-outline-secondary mt-3">
                <i class="fas fa-arrow-left"></i> Volver al inicio
            </a>
        </main>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
