<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Dragonstone - Categorías</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/estilos_dragon.css}" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; }
        .navbar-dragon { background-color: #000; border-bottom: 2px solid #e63946; }
        .logo-text { color: #e63946; font-weight: bold; font-size: 1.5rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-dragon p-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
                <img th:src="@{/images/logo-dragon.png}" alt="Logo" style="width: 40px; margin-right: 10px;">
                <span class="logo-text">DRAGONSTONE</span>
            </a>
            <div class="navbar-nav ms-4">
                <a class="nav-link" th:href="@{/gameshop/listado}">Videojuegos</a>
                <a class="nav-link active" th:href="@{/categoria/listado}">Categorías</a>
                
                <div sec:authorize="hasRole('ROLE_ADMIN')" class="d-flex">
                    <a class="nav-link" th:href="@{/consultas/listado}">Consultas</a>
                    <a class="nav-link text-warning fw-bold" th:href="@{/admin/listado}">Admin</a>
                </div>
            </div>
            <div class="ms-auto">
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-outline-danger">Sign In</a>
                </div>
                <div sec:authorize="isAuthenticated()" class="dropdown d-inline">
                    <button class="btn btn-danger btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <span sec:authentication="name">Usuario</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item">Cerrar Sesión</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 style="color: #e63946;">Categorías de la Forja</h2>
        <div class="table-responsive mt-4">
            <table class="table table-dark table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Descripción</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${categorias}">
                        <td th:text="${c.idCategoria}"></td>
                        <td th:text="${c.descripcion != null ? c.descripcion : 'Categoría #' + c.idCategoria}"></td>
                        <td>
                            <span th:class="${c.activo} ? 'badge bg-success' : 'badge bg-danger'"
                                  th:text="${c.activo} ? 'Activa' : 'Inactiva'"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
