<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>
        <header th:replace="~{general/fragmentos :: header}"></header>

        <main class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card-custom p-4 shadow" style="border-radius: 10px;">
                        <h4 class="text-neon mb-4">
                            <i class="fas fa-tag"></i>
                            <span th:text="${categoria.idCategoria != null} ? 'Editar Categoría' : 'Nueva Categoría'">Categoría</span>
                        </h4>

                        <form th:action="@{/categoria/guardar}" method="post" th:object="${categoria}">
                            <input type="hidden" th:field="*{idCategoria}"/>

                            <div class="mb-3">
                                <label class="form-label text-muted small">Nombre *</label>
                                <input type="text" th:field="*{nombre}" class="form-control form-control-dark"
                                       placeholder="Ej: Consolas de 8 bits" required/>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small">Descripción</label>
                                <textarea th:field="*{descripcion}" class="form-control form-control-dark"
                                          rows="3" placeholder="Descripción de la categoría"></textarea>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-warning fw-bold">
                                    <i class="fas fa-save"></i> Guardar
                                </button>
                                <a th:href="@{/categoria/listado}" class="btn btn-outline-secondary">
                                    <i class="fas fa-times"></i> Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
