<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>Dragonstone - Gameshop</title>
        <meta charset="UTF-8"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link th:href="@{/css/estilos_dragon.css}" rel="stylesheet">
        <style>
            body {
                background-color: #1a1a1a;
                color: white;
            }
            .navbar-dragon {
                background-color: #000;
                border-bottom: 2px solid #e63946;
            }
            .logo-text {
                color: #e63946;
                font-weight: bold;
                font-size: 1.5rem;
            }
            .catalog-title {
                color: #e63946;
                margin-top: 20px;
                font-weight: bold;
            }
            .table-dragon {
                background-color: #2b2d42;
                border-radius: 10px;
                overflow: hidden;
            }
            .table-dragon thead {
                background-color: #4a4e69;
            }
            .price-tag {
                color: #ffb703;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark navbar-dragon p-3">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
                    <img th:src="@{/images/logo-dragon.png}" alt="Dragon Logo" style="width: 40px; margin-right: 10px;">
                    <span class="logo-text">DRAGONSTONE</span>
                </a>

                <div class="navbar-nav ms-4">
                    <a class="nav-link" th:href="@{/gameshop/listado}">Videojuegos</a>
                    <a class="nav-link" th:href="@{/categoria/listado}">Categorías</a>
                    <a class="nav-link" th:href="@{/consultas/listado}">Consultas</a>
                    <a class="nav-link text-warning" th:href="@{/admin/panel}">Admin</a>
                </div>

                <div class="ms-auto">
                    <a th:href="@{/login}" class="btn btn-outline-danger">Sign In</a>
                </div>
            </div>
        </nav>

        <div class="container">
            <h2 class="catalog-title">Catálogo de la Forja</h2>

            <div class="table-responsive mt-4">
                <table class="table table-dark table-hover align-middle table-dragon">
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Desarrollador</th>
                            <th>Género</th>
                            <th>Precio</th>
                            <th>Imagen</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="j : ${juegos}">
                            <td th:text="${j.titulo}"></td>
                            <td th:text="${j.desarrollador}"></td>
                            <td th:text="${j.genero}"></td>
                            <td class="price-tag" th:text="${'$' + j.precio}"></td>
                            <td>
                                <img th:src="@{'/' + ${j.rutaImagen}}" alt="Portada" style="width: 60px; border-radius: 4px;">
                            </td>
                            <td>
                                <form th:action="@{/carrito/agregar}" method="POST">
                                    <input type="hidden" name="idVideojuego" th:value="${j.idVideojuego}"/>
                                    <button type="submit" class="btn btn-sm btn-danger">Añadir</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${juegos == null or juegos.empty}">
                            <td colspan="6" class="text-center text-muted p-4">
                                La forja está vacía. No se encontraron juegos.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/carrito/ver}" class="btn btn-warning fw-bold">Ver mi Carrito</a>
            </div>
        </div>

        <footer class="mt-5 p-4 text-center border-top border-secondary">
            <p class="text-muted">© 2026 Dragonstone - Keny's Project</p>
        </footer>
    </body>
</html>
