<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Modificar Juego</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2>Detalles del Videojuego</h2>
        <form th:action="@{/gameshop/guardar}" th:object="${gameshop}" method="POST" class="mt-4">
            <input type="hidden" name="idVideojuego" th:field="*{idVideojuego}"/>
            
            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" class="form-control" name="titulo" th:field="*{titulo}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Desarrollador</label>
                <input type="text" class="form-control" name="desarrollador" th:field="*{desarrollador}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Género</label>
                <input type="text" class="form-control" name="genero" th:field="*{genero}">
            </div>
            <div class="mb-3">
                <label class="form-label">Precio</label>
                <input type="number" step="0.01" class="form-control" name="precio" th:field="*{precio}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Ruta Imagen (URL)</label>
                <input type="text" class="form-control" name="rutaImagen" th:field="*{rutaImagen}">
            </div>
            
            <button type="submit" class="btn btn-success">Guardar Juego</button>
            <a th:href="@{/gameshop/listado}" class="btn btn-secondary">Regresar</a>
        </form>
    </div>
</body>
</html>
